{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Control de presencia</h1>

    <div class="botonera">

   {% for p in profesores %}
<form method="POST">
    <input type="hidden" name="profesor_id" value="{{ p[0] }}">

    <button class="btn-profesor
        {% if p[0] in presentes %}presente{% endif %}">
        {{ p[1] }}
    </button>
</form>
{% endfor %}

    </div>

</div>

{% endblock %}
